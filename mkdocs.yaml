site_name: Touchstone
repo_url: https://github.com/awinick/touchstone

theme:
  name: material
  features:
    - content.code.copy
    - content.tabs.link
    - content.math

plugins:
  - search
  - mkdocstrings:
      default_handler: python

markdown_extensions:
  - pymdownx.arithmatex:
      inline_syntax: dollar
      generic: true
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Usage: usage.md
  - API Reference:
      - Algorithms: reference/touchstone.algorithms.md